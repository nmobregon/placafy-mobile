<ion-card>
  <ion-card-content>
    @if (showPlate()) {
      <div class="card-header">
        <div class="plate-tap" (click)="onPlateTap($event)">
          <app-plate-badge [plateNumber]="message().plateNumber" />
        </div>
        <div class="header-actions">
          <ion-note class="time">{{ relativeTime() }}</ion-note>
          <ion-button
            fill="clear"
            size="small"
            class="share-message-button"
            (click)="shareMessage($event)"
            [attr.aria-label]="i18n.t('share.shareMessage')"
          >
            <ion-icon name="share-social-outline" />
          </ion-button>
        </div>
      </div>
    } @else {
      <div class="card-header card-header--time-only">
        <div class="header-actions">
          <ion-note class="time">{{ relativeTime() }}</ion-note>
          <ion-button
            fill="clear"
            size="small"
            class="share-message-button"
            (click)="shareMessage($event)"
            [attr.aria-label]="i18n.t('share.shareMessage')"
          >
            <ion-icon name="share-social-outline" />
          </ion-button>
        </div>
      </div>
    }
    <p class="message-text">{{ message().text }}</p>
    <div class="card-footer">
      @if (message().geoOrigin) {
        <ion-note class="geo-origin">{{ message().geoOrigin }}</ion-note>
      }
      <ion-note class="sender">{{ message().senderName }}</ion-note>
    </div>
  </ion-card-content>
</ion-card>
